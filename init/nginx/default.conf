server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    # Serve Django static files collected by the backend container.
    location /static/ {
        alias /var/www/backend_static/;
        access_log off;
        expires 7d;
    }

    # Serve uploaded files if the backend later exposes media assets.
    location /media/ {
        alias /var/www/backend_media/;
        expires 7d;
    }

    # Keep every backend API under the same origin as the frontend.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin is proxied separately because it does not live under /api/.
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite/React routes fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
